<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>錯題整理器 Ultimate</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>錯題整理器 Ultimate</h1>

    <div class="container">
        <input type="text" id="question" placeholder="輸入錯題內容...">
        
        <select id="category">
            <option>數學</option>
            <option>英文</option>
            <option>自然</option>
            <option>社會</option>
        </select>

        <div class="upload-section">
            <label for="imageInput" class="camera-btn">📷 拍照或上傳題目</label>
            <input type="file" id="imageInput" accept="image/*" capture="environment" style="display:none" onchange="previewImage(this)">
            <div id="imagePreview"></div>
        </div>

        <button class="primary-btn" onclick="addItem()">新增錯題</button>

        <hr>

        <input type="text" id="search" placeholder="搜尋關鍵字..." oninput="show()">
        <div id="tabs" class="tab-container"></div>
        
        <div id="list"></div>

        <hr>

        <div class="data-management">
            <button onclick="exportData()">匯出備份 (JSON)</button>
            <label class="import-btn">
                匯入備份 <input type="file" onchange="importData(event)" style="display:none">
            </label>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
