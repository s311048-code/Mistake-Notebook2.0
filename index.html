<div class="upload-section">
  <button onclick="document.getElementById('cameraInput').click()">📷 直接拍照</button>
  <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display: none;">

  <button onclick="document.getElementById('galleryInput').click()">🖼️ 從圖庫選取</button>
  <input type="file" id="galleryInput" accept="image/*" style="display: none;">
</div>

<script>
  // 統一處理圖片顯示或上傳的邏輯
  function handleFileSelect(event) {
    const file = event.target.files[0];
    if (file) {
      console.log("選取的檔案：", file.name);
      // 在這裡加入你原本顯示圖片或 OCR 的代碼
    }
  }

  document.getElementById('cameraInput').addEventListener('change', handleFileSelect);
  document.getElementById('galleryInput').addEventListener('change', handleFileSelect);
</script>
